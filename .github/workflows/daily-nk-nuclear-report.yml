name: Daily NK Nuclear Activities Report

on:
  schedule:
    # 한국시간 오전 8시 (UTC 23:00 전날)
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Target date (YYYY-MM-DD). Defaults to today if empty.'
        required: false
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Cheliped Browser
        run: |
          git clone https://github.com/tykimos/cheliped-browser.git /tmp/cheliped-browser
          cd /tmp/cheliped-browser/scripts
          npm install
          npm run build 2>/dev/null || true
          echo "CHELIPED_CLI=/tmp/cheliped-browser/scripts/cheliped-cli.mjs" >> $GITHUB_ENV

      - name: Verify Cheliped and Chrome
        run: |
          which google-chrome || which chromium-browser || echo "No Chrome found"
          node $CHELIPED_CLI '[{"cmd":"goto","args":["https://www.google.com"]},{"cmd":"close"}]' && echo "Cheliped: OK" || echo "Cheliped: FAILED"

      - name: Determine target date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            echo "target=${{ github.event.inputs.target_date }}" >> $GITHUB_OUTPUT
          else
            echo "target=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi
          echo "year=$(date -u +%Y -d "${{ github.event.inputs.target_date || '$(date -u +%Y-%m-%d)' }}" 2>/dev/null || date -u +%Y)" >> $GITHUB_OUTPUT
          echo "month=$(date -u +%m -d "${{ github.event.inputs.target_date || '$(date -u +%Y-%m-%d)' }}" 2>/dev/null || date -u +%m)" >> $GITHUB_OUTPUT

      - name: Generate report with Claude Code
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-opus-4-6 --allowedTools 'Bash(*)' 'Read(*)' 'Write(*)' 'Edit(*)' 'Glob(*)' 'Grep(*)' 'WebSearch(*)' 'WebFetch(*)'"
          use_bedrock: false
          use_vertex: false
          prompt: |
            You are the North Korean Nuclear Activities daily report agent.

            **Target date:** ${{ steps.date.outputs.target }}
            **Cheliped CLI:** Available at $CHELIPED_CLI (environment variable)

            Read CLAUDE.md for full project rules, pipeline architecture, data schemas, and search keywords.
            Read config/search-sites.json for the list of search engines and custom sites.

            You MUST execute all 4 phases of the pipeline sequentially, saving intermediate files at each step.

            ---

            ## Phase 0: Prepare

            ```bash
            mkdir -p sources/${{ steps.date.outputs.target }}
            mkdir -p reports/${{ steps.date.outputs.year }}/${{ steps.date.outputs.month }}
            ```

            - Find previous 7 days of `sources/*/sources.json` files using Glob
            - Find previous 7 days of reports using Glob `reports/**/*.md`
            - Read them for deduplication and relationship analysis

            ---

            ## Phase 1: Collect (수집)

            **Output:** `sources/${{ steps.date.outputs.target }}/search-results.json`

            Perform multilingual searches and save ALL results to a structured JSON file.

            **WebSearch (built-in) — at least 8 searches:**
            - Korean (3+): "북핵 최신 뉴스", "북한 핵실험", "북한 미사일 발사"
            - English (3+): "North Korean nuclear news today", "DPRK missile launch", "North Korea sanctions update"
            - Japanese (1+): "北朝鮮 核実験 最新ニュース"
            - Chinese (1+): "朝鲜核试验 最新消息"

            **Cheliped Browser — search engines:**
            ```bash
            node $CHELIPED_CLI '[{"cmd":"search","args":["북핵","google"]},{"cmd":"extract","args":["all"]},{"cmd":"close"}]'
            node $CHELIPED_CLI '[{"cmd":"search","args":["북한 핵실험","naver"]},{"cmd":"extract","args":["all"]},{"cmd":"close"}]'
            node $CHELIPED_CLI '[{"cmd":"search","args":["朝鲜核试验","baidu"]},{"cmd":"extract","args":["all"]},{"cmd":"close"}]'
            node $CHELIPED_CLI '[{"cmd":"search","args":["北朝鮮 核実験","yahoo_japan"]},{"cmd":"extract","args":["all"]},{"cmd":"close"}]'
            ```

            **Cheliped Browser — custom sites (38 North, NK News, Reuters, etc.):**
            Read config/search-sites.json for URLs. Use goto + wait + extract + close pattern.

            Save the JSON file following the schema in CLAUDE.md (searches array with method, engine, keyword, language, timestamp, results).

            Remove duplicate URLs within search-results.json (keep first occurrence).

            ---

            ## Phase 2: Tag (태깅)

            **Input:** `sources/${{ steps.date.outputs.target }}/search-results.json` + previous `sources/*/sources.json`
            **Output:** `sources/${{ steps.date.outputs.target }}/sources.json`

            Compare each search result against previous 7 days' sources.json files:
            - `new`: No matching URL or similar title in previous sources
            - `reported`: Same URL or very similar title already exists
            - `update`: Same event but contains significant new information

            For each item, record:
            - `id`: sequential (src-001, src-002, ...)
            - `tag`: new / reported / update
            - `related_report`: date of related previous report (if any)
            - `related_item`: title of related item in previous report (if any)
            - `tag_reason`: specific explanation of why this tag was assigned

            Keep ALL items including `reported` ones (for traceability). Save following the schema in CLAUDE.md.

            ---

            ## Phase 3: Analyze (분석)

            **Input:** `sources/${{ steps.date.outputs.target }}/sources.json` + previous reports
            **Output:** `sources/${{ steps.date.outputs.target }}/analysis.md` + `sources/${{ steps.date.outputs.target }}/report-basis.md`

            **analysis.md** — Relationship analysis:
            - 분석 요약 (counts of new/update/reported)
            - 신규 소스 분석 (importance, category, why it matters)
            - 기존 보도 추적 (what's new, tracking value)
            - 제외 소스 (why excluded)
            - 주제별 흐름 분석 (7-day trends per topic)

            **report-basis.md** — Report writing rationale:
            - 포함 항목 table (source ID, title, tag, category, inclusion reason)
            - 제외 항목 table (source ID, title, exclusion reason)
            - 보고서 구성 방향 (summary direction, analysis focus, tracking items)

            ---

            ## Phase 4: Report (보고서)

            **Input:** All Phase 1-3 outputs
            **Output:** `reports/${{ steps.date.outputs.year }}/${{ steps.date.outputs.month }}/${{ steps.date.outputs.target }}.md`

            Write the report following CLAUDE.md structure:
            - YAML frontmatter (title, date, sources_count, new_items, updated_items)
            - Only include items marked for inclusion in report-basis.md
            - For `update` items, add tracking reference: "← YYYY-MM-DD 이전 항목 제목"
            - If no items to include, create "특이사항 없음" report

            ---

            ## Phase 5: Commit & Publish

            **Commit to main repo (sources + reports together):**
            ```bash
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add sources/ reports/
            git commit -m "report: daily NK nuclear update (${{ steps.date.outputs.target }})"
            git push
            ```

            **Publish to GitHub Wiki:**
            ```bash
            git clone https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.wiki.git /tmp/wiki
            ```

            Copy report to wiki, stripping YAML frontmatter:
            ```bash
            sed '1{/^---$/!q;};1,/^---$/d' reports/${{ steps.date.outputs.year }}/${{ steps.date.outputs.month }}/${{ steps.date.outputs.target }}.md > /tmp/wiki/${{ steps.date.outputs.target }}.md
            ```

            Update `/tmp/wiki/Home.md` — prepend today's report link.
            Update `/tmp/wiki/_Sidebar.md` — keep last 14 days.
            Update `/tmp/wiki/Monthly-${{ steps.date.outputs.year }}-${{ steps.date.outputs.month }}.md` — monthly index.

            ```bash
            cd /tmp/wiki
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "report: ${{ steps.date.outputs.target }}"
            git push
            ```
